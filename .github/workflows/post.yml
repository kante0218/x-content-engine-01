name: auto-post

# 髙橋敢輝(@kante0123) 自動投稿。Macが動いていなくてもGitHubのクラウドで実行する。
#
# ランダム時刻で1日3〜5回(bot感を消すため回数も日替わり):
#   - 1日12個の不規則な候補スロット(下のcron)で起動する。
#   - 各起動で should_post.py が「投稿するか」をリザーバ方式で確率判定する。
#   - 1日の目標回数は X_DAILY_TARGET(=4) を基準に、日付から決定的に 3〜5 回でゆらす。
#     当たるスロットは毎日ランダムに散る。
#   - 投稿が確定した回だけ、さらに0〜23分のランダム遅延を入れて分単位でも時刻を大きくばらす。
#   - 投稿しない回は即終了するので、GitHub Actionsの実行時間はほとんど消費しない。
#
# cronはUTC。下のコメントはJST。should_post.py の SLOTS_JST と必ず同期すること。
on:
  schedule:
    - cron: "50 22 * * *"   # 07:50 JST
    - cron: "5 0 * * *"     # 09:05 JST
    - cron: "20 1 * * *"    # 10:20 JST
    - cron: "40 2 * * *"    # 11:40 JST
    - cron: "55 3 * * *"    # 12:55 JST
    - cron: "15 5 * * *"    # 14:15 JST
    - cron: "30 6 * * *"    # 15:30 JST
    - cron: "50 7 * * *"    # 16:50 JST
    - cron: "10 9 * * *"    # 18:10 JST
    - cron: "25 10 * * *"   # 19:25 JST
    - cron: "40 11 * * *"   # 20:40 JST
    - cron: "55 12 * * *"   # 21:55 JST
  workflow_dispatch:        # 手動テスト用
    inputs:
      dry_run:
        description: "true なら生成のみで投稿しない(検証用)"
        type: boolean
        default: false
      force:
        description: "true ならスロット確率判定を無視して必ず投稿する(手動用)"
        type: boolean
        default: false

concurrency:
  group: auto-post          # 多重起動による二重投稿を防止
  cancel-in-progress: false

permissions:
  contents: write           # 投稿履歴(dedup/日次カウント用)を commit back するため

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install anthropic python-dotenv requests-oauthlib requests

      - name: Decide whether to post this slot
        id: gate
        env:
          X_DAILY_TARGET: "4"
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "force=true → 判定スキップして投稿"
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif python scripts/should_post.py; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Random minute jitter (only when posting)
        if: steps.gate.outputs.go == 'true'
        run: |
          J=$(( RANDOM % 1381 ))   # 0〜23分。投稿確定の回だけ遅らせ、分単位でも時刻を大きくばらす
          echo "sleep ${J}s (~$(( J / 60 ))min) で分単位の時刻をばらす"
          sleep "$J"

      - name: Generate draft
        if: steps.gate.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_draft.py

      - name: Polish & post pending
        if: steps.gate.outputs.go == 'true'
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_HANDLE: kante0123
          X_MAX_CHARS: ${{ vars.X_MAX_CHARS || '900' }}
          X_REPLY_THREAD_RATE: ${{ vars.X_REPLY_THREAD_RATE || '0.4' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_LIVE_POST: ${{ github.event.inputs.dry_run == 'true' && 'false' || 'true' }}
        run: python scripts/pipeline.py

      - name: Persist post history (dedup & daily count state)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A drafts/posted drafts/pending logs/*.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist post state [skip ci]"
            git push
          else
            echo "no state change to commit"
          fi
